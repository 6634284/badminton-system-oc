version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: btm-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: btm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btm_secure_2024}
      POSTGRES_DB: badminton
    volumes:
      - btm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: btm-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-btm_redis_2024}
    volumes:
      - btm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-btm_redis_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: btm-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    environment:
      MINIO_ROOT_USER: btm_admin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-btm_minio_2024}
    volumes:
      - btm_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  client-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: btm-client-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      DATABASE_URL: postgresql://btm:${POSTGRES_PASSWORD:-btm_secure_2024}@postgres:5432/badminton?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-btm_redis_2024}
      JWT_SECRET: ${JWT_SECRET:-btm_jwt_secret_2024}
      NODE_ENV: production
      WECHAT_MOCK: "true"
      WECHAT_PAY_MOCK: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: btm-admin-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3011:3001"
    environment:
      DATABASE_URL: postgresql://btm:${POSTGRES_PASSWORD:-btm_secure_2024}@postgres:5432/badminton?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-btm_redis_2024}
      JWT_SECRET: ${JWT_SECRET:-btm_jwt_secret_2024}
      NODE_ENV: production
      ADMIN_PORT: 3001
      WECHAT_MOCK: "true"
      WECHAT_PAY_MOCK: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  open-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: btm-open-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:3002"
    environment:
      DATABASE_URL: postgresql://btm:${POSTGRES_PASSWORD:-btm_secure_2024}@postgres:5432/badminton?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-btm_redis_2024}
      JWT_SECRET: ${JWT_SECRET:-btm_jwt_secret_2024}
      NODE_ENV: production
      OPEN_PORT: 3002
      WECHAT_MOCK: "true"
      WECHAT_PAY_MOCK: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  btm_postgres_data:
  btm_redis_data:
  btm_minio_data:
